</head>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCM4I58uE2IWjQdaQT2Ao4YD2pEcfyRAw",
            authDomain: "encyclopedia-myv.firebaseapp.com",

            appId: "1:512567729981:web:16b3f19886e7e9d575af54"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const searchInput = document.getElementById('search-input');
        const searchSuggestions = document.getElementById('search-suggestions');
        const articleTitle = document.getElementById('article-title');
        const articleContent = document.getElementById('article-content');
        const lastEditedElement = document.getElementById('last-edited');
        const editButton = document.getElementById('edit-button');
        const editor = document.getElementById('editor');
        const editorTextarea = document.getElementById('editor-textarea');
        const saveButton = document.getElementById('save-button');
        const deleteButton = document.getElementById('delete-button');
        const cancelButton = document.getElementById('cancel-button');
        const recentArticlesList = document.getElementById('recent-articles-list');
        const newArticleTitle = document.getElementById('new-article-title');
        const createButton = document.getElementById('create-button');
        const notification = document.getElementById('notification');
        const homeLink = document.getElementById('home-link');
        const randomButton = document.getElementById('random-button');
        const seeAllButton = document.getElementById('see-all-button');
        const allArticlesModal = document.getElementById('all-articles-modal');
        const allArticlesList = document.getElementById('all-articles-list');
        const closeAllArticles = document.getElementById('close-all-articles');
        const prevPageButton = document.getElementById('prev-page');
        const nextPageButton = document.getElementById('next-page');
        const paginationInfo = document.getElementById('pagination-info');
        const switchToCyrillicButton = document.getElementById('switch-to-cyrillic');

        let currentArticle = 'main';
        let allArticles = [];
        let currentPage = 1;
        let lastLoadedArticle = null;
        let isLoading = false;
        const articlesPerPage = 21;

        const erzyaMonthNames = [
            "якшамоковонь", "даволковонь", "эйсюроковонь", "чадыковонь",
            "панжиковонь", "аштемаковонь", "мӓдьковонь", "умарьковонь",
            "таштомаковонь", "ожоковонь", "сундерьковонь", "ацамоковонь"
        ];

        const WELCOME_ARTICLE = {
            id: 'main',
            title: 'Паро мельсэ совадо Ӓрзянь Содамокудонтень!',
            content: `<p>Ӓрзянь Содамокудось те оля, киньгак ӓйстэ а аштиця ӓрзянь кельсэ энциклопедия (лиякс <i>содамокудо</i>).</p><p>Ӓрьвантень тӓеви эли витеви сонзэ сёрмадовксонзо. Вӓсе витематне таштавить сеске. Ушодомга, вӓшнек сёрмадовкс вере улиця вӓшнема паксянть вӓльде эли тӓйть од.</p><p><div id="statistics-placeholder" style="margin-top: 10px;">Тарган статистикат...</div></p><p>Ули мелеть кодаяк лиякс лӓздамс тӓвентень? Сёрмадт те адрестэнть лангс: <a href="mailto:aleksanterinazarenko@gmail.com">aleksanterinazarenko@gmail.com</a>.</p>`,
            createdAt: '2024-01-01T00:00:00.000Z'
        };

        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }

        function loadAllArticles() {
            const articlesRef = database.ref('articles');
            articlesRef.once('value')
                .then((snapshot) => {
                    const articles = snapshot.val();
                    if (articles) {
                        allArticles = Object.entries(articles).map(([id, article]) => ({
                            id,
                            title: article.title,
                            createdAt: article.createdAt || '1970-01-01T00:00:00.000Z'
                        })).sort((a, b) => a.title.localeCompare(b.title));
                    } else {
                        allArticles = [];
                    }
                })
                .catch((error) => {
                    console.error('Error loading articles for search:', error);
                });
        }

        function showSearchSuggestions(searchTerm) {
            if (!searchTerm) {
                searchSuggestions.style.display = 'none';
                return;
            }

            const lowerSearchTerm = searchTerm.toLowerCase();
            const startsWithTerm = [];
            const containsTerm = [];

            allArticles.forEach(article => {
                const lowerTitle = article.title.toLowerCase();
                const lowerId = article.id.toLowerCase();
                const transliteratedTitle = transliterate(article.title).toLowerCase();
                const transliteratedId = transliterate(article.id).toLowerCase();

                if (lowerTitle.startsWith(lowerSearchTerm) ||
                    lowerId.startsWith(lowerSearchTerm) ||
                    transliteratedTitle.startsWith(lowerSearchTerm) ||
                    transliteratedId.startsWith(lowerSearchTerm)) {
                    startsWithTerm.push(article);
                } else if (lowerTitle.includes(lowerSearchTerm) ||
                    lowerId.includes(lowerSearchTerm) ||
                    transliteratedTitle.includes(lowerSearchTerm) ||
                    transliteratedId.includes(lowerSearchTerm)) {
                    containsTerm.push(article);
                }
            });

            const suggestions = [...startsWithTerm, ...containsTerm].slice(0, 5);

            if (suggestions.length === 0) {
                searchSuggestions.style.display = 'none';
                return;
            }

            searchSuggestions.innerHTML = '';
            suggestions.forEach(article => {
                const suggestion = document.createElement('div');
                suggestion.className = 'search-suggestion';
                suggestion.textContent = transliterate(article.title);
                suggestion.addEventListener('click', () => {
                    loadArticle(article.id, false);
                    searchInput.value = '';
                    searchSuggestions.style.display = 'none';
                    scrollToTop();
                });
                searchSuggestions.appendChild(suggestion);
            });

            searchSuggestions.style.display = 'block';
        }

        searchInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const searchTerm = searchInput.value.trim();
                if (searchTerm) {
                    const lowerSearchTerm = searchTerm.toLowerCase();

                    for (const article of allArticles) {
                        const lowerTitle = article.title.toLowerCase();
                        const lowerId = article.id.toLowerCase();
                        const transliteratedTitle = transliterate(article.title).toLowerCase();
                        const transliteratedId = transliterate(article.id).toLowerCase();

                        if (lowerTitle === lowerSearchTerm ||
                            lowerId === lowerSearchTerm ||
                            transliteratedTitle === lowerSearchTerm ||
                            transliteratedId === lowerSearchTerm) {
                            loadArticle(article.id);
                            searchSuggestions.style.display = 'none';
                            scrollToTop();
                            return;
                        }
                    }

                    const articleId = searchTerm.toLowerCase().replace(/\s+/g, '-');
                    loadArticle(articleId);
                    searchSuggestions.style.display = 'none';
                    scrollToTop();
                }
            }
        });

        loadAllArticles();

        function formatArticleTitle(articleId) {
            if (articleId === WELCOME_ARTICLE.id) {
                return WELCOME_ARTICLE.title;
            }
            const words = articleId.split('-');
            if (words.length === 0) return articleId;

            const firstWord = words[0].charAt(0).toUpperCase() + words[0].slice(1);
            const remainingWords = words.slice(1);

            return [firstWord, ...remainingWords].join(' ');
        }

        function updateURL(articleId, replace = false) {
            const newURL = `${window.location.origin}${window.location.pathname}?article=${articleId}`;

            if (replace) {
                window.history.replaceState({
                    articleId
                }, '', newURL);
            } else {
                window.history.pushState({
                    articleId
                }, '', newURL);
            }
        }

        window.addEventListener('popstate', function (event) {
            if (event.state && event.state.articleId) {
                loadArticle(event.state.articleId, true);
            } else {
                const urlParams = new URLSearchParams(window.location.search);
                const articleParam = urlParams.get('article');
                if (articleParam) {
                    loadArticle(articleParam, true);
                } else {
                    loadArticle(WELCOME_ARTICLE.id, true);
                }
            }
        });

        function loadArticleFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const articleParam = urlParams.get('article');
            if (articleParam) {
                loadArticle(articleParam);
            } else {
                loadArticle(WELCOME_ARTICLE.id);
            }
        }

        function loadRecentArticles() {
            const articlesRef = database.ref('articles');

            articlesRef.orderByChild('createdAt').limitToLast(5).once('value')
                .then((snapshot) => {
                    const articles = snapshot.val();
                    recentArticlesList.innerHTML = '';

                    if (articles) {
                        const articlesArray = Object.entries(articles)
                            .filter(([articleId]) => articleId !== WELCOME_ARTICLE.id)
                            .map(([articleId, articleData]) => ({
                                id: articleId,
                                title: articleData.title,
                                createdAt: articleData.createdAt || '1970-01-01T00:00:00.000Z'
                            }))
                            .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

                        articlesArray.forEach(article => {
                            const listItem = document.createElement('li');
                            const link = document.createElement('a');
                            link.href = `?article=${article.id}`;
                            link.textContent = article.title;
                            link.setAttribute('data-article', article.id);
                            link.addEventListener('click', function (e) {
                                e.preventDefault();
                                loadArticle(article.id, false);
                                scrollToTop();
                            });
                            listItem.appendChild(link);
                            recentArticlesList.appendChild(listItem);
                        });

                        if (articlesArray.length === 0) {
                            recentArticlesList.innerHTML = '<li>Од сёрмадовкст арасть</li>';
                        }
                    } else {
                        recentArticlesList.innerHTML = '<li>Од сёрмадовкст арасть</li>';
                    }
                })
                .catch((error) => {
                    console.error('Error loading recent articles:', error);
                    recentArticlesList.innerHTML = '<li>Таргамонь ильведевкс</li>';
                });
        }

        loadArticleFromURL();
        loadRecentArticles();

        searchInput.addEventListener('input', function (e) {
            showSearchSuggestions(e.target.value);
        });

        searchInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const searchTerm = searchInput.value.trim();
                if (searchTerm) {
                    loadArticle(searchTerm.toLowerCase().replace(/\s+/g, '-'));
                    searchSuggestions.style.display = 'none';
                    scrollToTop();
                }
            }
        });

        document.addEventListener('click', function (e) {
            if (!searchInput.contains(e.target) && !searchSuggestions.contains(e.target)) {
                searchSuggestions.style.display = 'none';
            }
        });

        editButton.addEventListener('click', function () {
            showEditor();
        });

        saveButton.addEventListener('click', function () {
            saveArticle();
        });

        deleteButton.addEventListener('click', function () {
            deleteArticle();
        });

        cancelButton.addEventListener('click', function () {
            hideEditor();
        });

        createButton.addEventListener('click', function () {
            createNewArticle();
        });

        homeLink.addEventListener('click', function (e) {
            if (e.button !== 0 || e.ctrlKey || e.metaKey) return;
            e.preventDefault();
            loadArticle(WELCOME_ARTICLE.id);
        });

        randomButton.addEventListener('click', function (e) {
            e.preventDefault();
            loadRandomArticle();
        });

        seeAllButton.addEventListener('click', function () {
            showAllArticlesModal();
        });

        closeAllArticles.addEventListener('click', function () {
            hideAllArticlesModal();
        });

        prevPageButton.addEventListener('click', function () {
            if (currentPage > 1) {
                currentPage--;
                displayAllArticlesPage();
            }
        });

        nextPageButton.addEventListener('click', function () {
            const totalPages = Math.ceil(allArticles.length / articlesPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                displayAllArticlesPage();
            }
        });

        function showAllArticlesModal() {
            allArticlesModal.style.display = 'block';
            currentPage = 1;
            displayAllArticlesPage();
        }

        function hideAllArticlesModal() {
            allArticlesModal.style.display = 'none';
        }

        allArticlesModal.addEventListener('click', function (e) {
            if (e.target === allArticlesModal) {
                hideAllArticlesModal();
            }
        });

        function displayAllArticlesPage() {
            const startIndex = (currentPage - 1) * articlesPerPage;
            const endIndex = startIndex + articlesPerPage;
            const pageArticles = allArticles.slice(startIndex, endIndex);
            const totalPages = Math.ceil(allArticles.length / articlesPerPage);
            allArticlesList.innerHTML = '';

            if (pageArticles.length === 0) {
                allArticlesList.innerHTML = '<p>Сёрмадовкст арасть</p>';
            } else {
                pageArticles.forEach(article => {
                    const link = document.createElement('a');
                    link.href = `?article=${article.id}`;
                    link.textContent = article.title;

                    link.addEventListener('click', function (e) {
                        if (e.button !== 0 || e.ctrlKey || e.metaKey || e.shiftKey) return;
                        e.preventDefault();
                        loadArticle(article.id, false);
                        hideAllArticlesModal();
                        scrollToTop();
                    });

                    allArticlesList.appendChild(link);
                });
            }

            paginationInfo.textContent = `Лопа ${currentPage} ${totalPages > 0 ? ` / ${totalPages}` : ''}`;
            prevPageButton.disabled = currentPage === 1;
            nextPageButton.disabled = currentPage === totalPages || totalPages === 0;
        }

        function updateEditButtonVisibility() {
            if (currentArticle === WELCOME_ARTICLE.id) {
                editButton.style.display = 'none';
            } else {
                editButton.style.display = 'block';
            }
        }

        function loadArticle(articleId, replaceHistory = false) {
            if (articleId === WELCOME_ARTICLE.id) {
                displayArticle(WELCOME_ARTICLE.id, WELCOME_ARTICLE);
                currentArticle = WELCOME_ARTICLE.id;
                updateURL(WELCOME_ARTICLE.id, replaceHistory);
                updateEditButtonVisibility();
                scrollToTop();
                return;
            }

            const articleRef = database.ref('articles/' + articleId);

            articleRef.once('value')
                .then((snapshot) => {
                    if (snapshot.exists()) {
                        const articleData = snapshot.val();
                        displayArticle(articleId, articleData);
                        currentArticle = articleId;
                        updateURL(articleId, replaceHistory);
                    } else {
                        displayCreateOption(articleId);
                        updateURL(articleId, replaceHistory);
                    }
                    updateEditButtonVisibility();
                    scrollToTop();
                })
                .catch((error) => {
                    console.error('Error loading article:', error);
                    showNotification('Таргамонь ильведевкс', 'error');
                });
        }

        function displayArticle(articleId, articleData) {
            articleTitle.textContent = articleData.title;
            articleContent.innerHTML = articleData.content;
            editorTextarea.value = articleData.content;
            searchInput.value = '';

            if (articleId !== WELCOME_ARTICLE.id && articleData.lastEdited) {

                const date = new Date(articleData.lastEdited);

                const day = date.getDate();
                const month = erzyaMonthNames[date.getMonth()];
                const year = date.getFullYear();

                const formatted = `${year}-це иень ${month} ${day}-це чистэ`;

                lastEditedElement.textContent = `Витезь мӓельцекс ${formatted}`;
                lastEditedElement.style.display = "block";

            } else {
                lastEditedElement.style.display = "none";
            }

            hideEditor();

            if (articleId === WELCOME_ARTICLE.id) {
                setTimeout(() => {
                    loadStatistics();
                }, 100);
            }
        }

        function displayCreateOption(articleId) {
            const formattedTitle = formatArticleTitle(articleId);

            lastEditedElement.style.display = "none";

            articleTitle.textContent = formattedTitle;
            articleContent.innerHTML = `
                <p>Сёрмадовксось зярс арась.</p>
                <p>Лепштик Витема-плаштиненть тӓемга сонзэ.</p>
            `;
            editorTextarea.value = '';
            currentArticle = articleId;
        }

        function showEditor() {
            if (currentArticle === WELCOME_ARTICLE.id) {
                showNotification('Прявт лопась а витеви', 'error');
                return;
            }

            loadArticleForEditor();

            articleContent.style.display = 'none';
            lastEditedElement.style.display = 'none';
            editor.style.display = 'block';
            editButton.style.display = 'none';
            cancelButton.style.display = 'block';

            scrollToTop();
        }

        function loadArticleForEditor() {
            if (currentArticle === WELCOME_ARTICLE.id) {
                editorTextarea.value = WELCOME_ARTICLE.content;
                return;
            }

            const articleRef = database.ref('articles/' + currentArticle);
            articleRef.once('value')
                .then((snapshot) => {
                    if (snapshot.exists()) {
                        const articleData = snapshot.val();
                        editorTextarea.value = articleData.content;
                    } else {
                        editorTextarea.value = '';
                    }
                })
                .catch((error) => {
                    console.error('Error loading article for editor:', error);
                    editorTextarea.value = '';
                });
        }

        function hideEditor() {
            articleContent.style.display = 'block';
            editor.style.display = 'none';
            cancelButton.style.display = 'none';
            updateEditButtonVisibility();

            if (currentArticle !== WELCOME_ARTICLE.id) {
                const articleRef = database.ref('articles/' + currentArticle);
                articleRef.once('value').then((snapshot) => {
                    if (snapshot.exists() && snapshot.val().lastEdited) {
                        lastEditedElement.style.display = 'block';
                    }
                });
            }
        }

        function saveArticle() {
            const content = editorTextarea.value.trim();
            if (!content) {
                showNotification('Сёрмадовксось чаво', 'error');
                return;
            }

            const articleRef = database.ref('articles/' + currentArticle);
            const title = formatArticleTitle(currentArticle);

            articleRef.once('value')
                .then((snapshot) => {
                    const updates = {
                        title: title,
                        content: content,
                        lastEdited: new Date().toISOString()
                    };

                    if (!snapshot.exists()) {
                        updates.createdAt = new Date().toISOString();
                    } else {
                        const existingData = snapshot.val();
                        updates.createdAt = existingData.createdAt;
                    }

                    return articleRef.set(updates);
                })
                .then(() => {
                    displayArticle(currentArticle, {
                        title,
                        content
                    });
                    updateURL(currentArticle, true);
                    showNotification('Сёрмадовксось таштазь!');
                    loadRecentArticles();
                    loadAllArticles();
                    loadStatistics();
                })
                .catch((error) => {
                    console.error('Error saving article:', error);
                    showNotification('Сёрмадовксонть таштамось ӓзь лисе', 'error');
                });
        }

        function deleteArticle() {
            if (currentArticle === WELCOME_ARTICLE.id) {
                showNotification('Прявт лопась а нардави', 'error');
                return;
            }

            if (!confirm('Кӓместэ нардасынек лопанть? Теде мӓйле сон а вӓлявтови.')) {
                return;
            }

            const articleRef = database.ref('articles/' + currentArticle);

            articleRef.remove()
                .then(() => {
                    showNotification('Сёрмадовксось нардазь!');
                    loadArticle(WELCOME_ARTICLE.id);
                    loadAllArticles();
                    loadStatistics();
                })
                .catch((error) => {
                    console.error('Error deleting article:', error);
                    showNotification('Сёрмадовксонть нардамось ӓзь лисе', 'error');
                });
        }

        function createNewArticle() {
            const title = newArticleTitle.value.trim();
            if (!title) {
                showNotification('Сёрмадык сёрмадовксонть лӓмензэ', 'error');
                return;
            }

            const articleId = title.toLowerCase().replace(/\s+/g, '-');
            newArticleTitle.value = '';

            const articleRef = database.ref('articles/' + articleId);

            articleRef.once('value')
                .then((snapshot) => {
                    if (snapshot.exists()) {
                        loadArticle(articleId, false);
                        scrollToTop();
                    } else {
                        currentArticle = articleId;
                        updateURL(articleId);
                        displayCreateOption(articleId);
                        updateEditButtonVisibility();
                        showEditor();
                        scrollToTop();
                    }
                })
                .catch((error) => {
                    console.error('Error creating article:', error);
                    showNotification('Од сёрмадовксонть тӓемстэ лиссь ильведевкс', 'error');
                });
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        let randomQueue = [];

        function loadRandomArticle() {
            const articlesRef = database.ref('articles');

            articlesRef.once('value')
                .then((snapshot) => {
                    const articles = snapshot.val();

                    if (!articles || Object.keys(articles).length === 0) {
                        showNotification('Сёрмадовкст арасть', 'error');
                        return;
                    }

                    const articleIds = Object.keys(articles);

                    randomQueue = randomQueue.filter(id => articleIds.includes(id));

                    if (randomQueue.length === 0) {
                        randomQueue = shuffleArray(articleIds.slice());
                    }

                    const nextArticleId = randomQueue.shift();

                    loadArticle(nextArticleId, false);
                })
                .catch((error) => {
                    console.error('Error loading random article:', error);
                    showNotification('Апак учонь сёрмадовксонть таргамонть ильведевкс', 'error');
                });
        }

        function showNotification(message, type = 'success') {
            notification.textContent = message;
            notification.style.backgroundColor = type === 'error' ? '#F6FAFF' : '#F6FAFF';
            notification.style.display = 'block';

            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        const articlesRef = database.ref('articles');
        articlesRef.on('child_changed', (snapshot) => {
            const articleId = snapshot.key;
            const articleData = snapshot.val();
            if (articleId === currentArticle && articleId !== WELCOME_ARTICLE.id) {
                displayArticle(articleId, articleData);
            }
            loadRecentArticles();
            loadAllArticles();

            if (currentArticle === WELCOME_ARTICLE.id) {
                loadStatistics();
            }
        });

        articlesRef.on('child_removed', (snapshot) => {
            const articleId = snapshot.key;
            if (articleId === currentArticle) {
                loadArticle(WELCOME_ARTICLE.id);
            }
            loadRecentArticles();
            loadAllArticles();

            if (currentArticle === WELCOME_ARTICLE.id) {
                loadStatistics();
            }
        });

        articlesRef.on('child_added', (snapshot) => {
            loadRecentArticles();
            loadAllArticles();

            if (currentArticle === WELCOME_ARTICLE.id) {
                loadStatistics();
            }
        });
    </script>

        function transliterate(text) {

                text = text.replace(/(ю[\u0302])/g, 'ё');

                text = text.replace(/([е])([и])([я])([і])/g, '$1j$2j$3');
                text = text.replace(/([аоуыэяёюиеъьіӕԙӓѣАОУЫЭЯЁЮИЕЪЬІӔԘӒѢ])([еёюя])/g, '$1j$2');
                text = text.replace(/([аоуыэяёюиеъіӕԙӓѣАОУЫЭЯЁЮИЕЪІӔԘӒѢ])([иі])/g, '$1$2');
                text = text.replace(/([аоуыэяёюиеъӕԙӓѣАОУЫЭЯЁЮИЕЪӔԘӒѢ])([й])/g, '$1j');
                text = text.replace(/([АОУЫЭЯЁЮИЕЪЬІӔѢ])([ЕЁЮЯ])/g, '$1J$2');
                text = text.replace(/([АОУЫЭЯЁЮИЕЪІӔѢ])([ИІ])/g, '$1$2');
                text = text.replace(/([АОУЫЭЯЁЮИЕЪӔѢ])([Й])/g, '$1J');

                text = text.replace(/(^|\s|[.,!?;:()\[\]{}<>"“”«»„“…\-])([иі])([аоуыэяёюиеъьіӕ])/g, '$1j$3');
                text = text.replace(/(^|\s|[.,!?;:()\[\]{}<>"“”«»„“…\-])([ИІ])([аоуыэяёюиеъьіӕ])/g, '$1J$3');

                text = text.replace(/(^|\s|[.,!?;:()\[\]{}<>"“”«»„“…\-])([ёюя])/g, '$1j$2');
                text = text.replace(/(^|\s|[.,!?;:()\[\]{}<>"“”«»„“…\-])([ЁЮЯ])/g, '$1J$2');
                text = text.replace(/-([ёюя])/g, '-j$1');
                text = text.replace(/-([ЁЮЯ])/g, '-J$1');

                text = text.replace(/([аеёиоуыэюяьАЕЁИОУЫЭЮЯЬ])э/g, '$1e')
                text = text.replace(/(^|\s|[.,!?;:()\[\]{}<>"“”«»„“…\-])э/g, '$1e');
                text = text.replace(/(^|\s|[.,!?;:()\[\]{}<>"“”«»„“…\-])Э/g, '$1E');
                text = text.replace(/(^|\s|[.,!?;:()\[\]{}<>"“”«»„“…\-])і/g, '$1i');
                text = text.replace(/(^|\s|[.,!?;:()\[\]{}<>"“”«»„“…\-])І/g, '$1I');

                text = text.replace(/([бвгжкмпфхчшБВГЖКМПФХЧШ])([яԙ])/g, '$1ä');
                text = text.replace(/([бвгжкмпфхчшБВГЖКМПФХЧШ])ё/g, '$1ö');
                text = text.replace(/([дзлнрстцДЗЛНРСТЦ])е/g, '$1e');
                text = text.replace(/([дзлнрстцДЗЛНРСТЦ])и/g, '$1i');

                text = text.replace(/([чшЧШ])ы/g, '$1i');

                text = text.replace(/([БВГЖКМПФХЧШЩбвгжкмпфхчшщ])ь/g, '$1');
                text = text.replace(/ъ/g, '');
                text = text.replace(/(\s|^)і/g, '$1j');

                text = text.replace(/И/g, 'I');
                text = text.replace(/Е/g, 'E');
                text = text.replace(/([ИЕЁЮЯ])([^А-Я])/g, function (match, p1, p2) {
                    return p1.toLowerCase() + p2;
                });

                text = text.replace(/«/g, '„').replace(/»/g, '“');

                const regexNoVowel = new RegExp(key + '[Ьь]', 'g');
                text = text.replace(regexNoVowel, value);

                text = text.replace(new RegExp(key + `([${front}])`, 'g'), value + '$1');
            }

            for (const [key, value] of Object.entries(palatals)) {
                const regexVowel = new RegExp(key + 'і([аиоуыэАИОУЫЭ])', 'g');
                text = text.replace(regexVowel, value + '$1');
            }

            text = text.trim().split('').map(char => letters[char] || char).join('');
            return (spaceBefore ? ' ' : '') + text + (spaceAfter ? ' ' : '');
        }

        function transliterateNode(node) {
            if (node.nodeType === Node.TEXT_NODE) {
                const original = node.nodeValue;
                const transliterated = transliterate(original);
                if (transliterated !== original) {
                    node.nodeValue = transliterated;
                }
            } else if (node.nodeType === Node.ELEMENT_NODE) {
                if (node.hasAttribute('placeholder')) {
                    const original = node.getAttribute('placeholder');
                    const transliterated = transliterate(original);
                    if (transliterated !== original) {
                        node.setAttribute('placeholder', transliterated);
                    }
                }

                if (node.tagName === 'OPTION') {
                    const original = node.textContent;
                    const transliterated = transliterate(original);
                    if (transliterated !== original) {
                        node.textContent = transliterated;
                    }
                }

                if (node.tagName === 'INPUT' || node.tagName === 'TEXTAREA') {
                    return;
                }

                Array.from(node.childNodes).forEach(transliterateNode);
            }
        }

        function transliteratePage() {
            transliterateNode(document.body);
        }

        document.addEventListener('DOMContentLoaded', function () {
            transliteratePage();
            loadStatistics();

            const observer = new MutationObserver(function (mutations) {
                let shouldTransliterate = false;

                mutations.forEach(function (mutation) {
                    if (mutation.type === 'childList' && mutation.addedNodes.length > 0) {
                        shouldTransliterate = true;
                    }
                    if (mutation.type === 'characterData') {
                        shouldTransliterate = true;
                    }
                });

                if (shouldTransliterate) {
                    clearTimeout(window.transliterateTimeout);
                    window.transliterateTimeout = setTimeout(() => {
                        transliteratePage();
                    }, 50);
                }
            });

            observer.observe(document.body, {
                childList: true,
                subtree: true,
                characterData: true
            });
        });

        switchToCyrillicButton.addEventListener('click', function (e) {
            e.preventDefault();

            const urlParams = new URLSearchParams(window.location.search);
            const currentArticle = urlParams.get('article');

            let newUrl = 'sodamokudo.html';
            if (currentArticle) {
                newUrl += `?article=${encodeURIComponent(currentArticle)}`;
            }

            window.location.href = newUrl;
        });

        function loadStatistics() {
            const articlesRef = database.ref('articles');
            articlesRef.once('value')
                .then((snapshot) => {
                    const articles = snapshot.val();
                    let articleCount = 0;
                    let latestArticleDate = null;
                    let latestArticleTitle = '';

                    if (articles) {
                        const filteredArticles = Object.entries(articles)
                            .filter(([id]) => id !== WELCOME_ARTICLE.id);

                        articleCount = filteredArticles.length;

                        filteredArticles.forEach(([id, article]) => {
                            if (article.createdAt) {
                                try {
                                    const articleDate = new Date(article.createdAt);
                                    if (!latestArticleDate || articleDate > latestArticleDate) {
                                        latestArticleDate = articleDate;
                                        latestArticleTitle = article.title || id;
                                    }
                                } catch (e) {
                                    console.error('Шкась а таргави.', article.createdAt);
                                }
                            }
                        });
                    }

                    const statsElement = document.getElementById('statistics-placeholder');
                    if (statsElement) {
                        let statsHTML = '';

                        if (articleCount === 0) {
                            statsHTML = 'Сёрмадовкст зярс арасть.';
                        } else {
                            statsHTML = `Те шкас тӓезь <strong>${articleCount}</strong> сёрмадовкст.`;

                            if (latestArticleDate) {

                                const day = latestArticleDate.getDate();
                                const monthIndex = latestArticleDate.getMonth();
                                const year = latestArticleDate.getFullYear();

                                if (monthIndex >= 0 && monthIndex < erzyaMonthNames.length) {
                                    const monthName = erzyaMonthNames[monthIndex];
                                    const formattedDate = `${year}-це иень ${monthName} ${day}-це чистэ`;
                                    statsHTML += ` Мӓельцесь ${formattedDate}.`;
                                }
                            }
                        }

                        statsElement.innerHTML = statsHTML;
                    }
                })
                .catch((error) => {
                    console.error('Error loading statistics:', error);
                    const statsElement = document.getElementById('statistics-placeholder');
                    if (statsElement) {
                        statsElement.innerHTML = 'Статистикатне а саевить.';
                    }
                });
        }
    </script>
