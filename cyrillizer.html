<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polish → Cyrillic</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f3f4f6;
            margin: 0;
            padding: 16px
        }

        .container {
            max-width: 900px;
            margin: 0 auto
        }

        h2 {
            text-align: center;
            margin-bottom: 16px;
            font-weight: 600
        }

        textarea,
        .output {
            width: 100%;
            min-height: 160px;
            padding: 14px;
            box-sizing: border-box;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            font-size: 18px;
            background: #fff;
            resize: none
        }

        .output {
            margin-top: 16px;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace
        }

        @media (max-width:699px) {

            textarea,
            .output {
                font-size: 14px
            }
        }

        @media (min-width:700px) {

            textarea,
            .output {
                font-size: 16px
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Polish → Cyrillic</h2>
        <textarea id="input"></textarea>
        <div class="output" id="output"></div>
    </div>
    <script>
        const letters = {
            "a": "а",
            "b": "б",
            "c": "ц",
            "ć": "ць",
            "d": "д",
            "e": "е",
            "f": "ф",
            "g": "г",
            "h": "ғ",
            "i": "и",
            "j": "й",
            "k": "к",
            "l": "ль",
            "ł": "л",
            "m": "м",
            "n": "н",
            "ń": "нь",
            "o": "о",
            "ó": "ꙋ",
            "p": "п",
            "r": "р",
            "s": "с",
            "ś": "сь",
            "t": "т",
            "u": "у",
            "w": "в",
            "y": "ы",
            "z": "з",
            "ź": "зь",
            "ż": "ж",
            "ą": "ѫ",
            "ę": "ѧ",
            "A": "А",
            "B": "Б",
            "C": "Ц",
            "Ć": "Ць",
            "D": "Д",
            "E": "Е",
            "F": "Ф",
            "G": "Г",
            "H": "Ғ",
            "I": "И",
            "J": "Й",
            "K": "К",
            "L": "Ль",
            "Ł": "Л",
            "M": "М",
            "N": "Н",
            "Ń": "Нь",
            "O": "О",
            "Ó": "Ꙋ",
            "P": "П",
            "R": "Р",
            "S": "С",
            "Ś": "Сь",
            "T": "Т",
            "U": "У",
            "W": "В",
            "Y": "Ы",
            "Z": "З",
            "Ź": "Зь",
            "Ż": "Ж",
            "Ą": "Ѫ",
            "Ę": "Ѧ",
        }

        function capFirst(src, repl) {
            return src[0] === src[0].toUpperCase() ? repl[0].toUpperCase() + repl.slice(1) : repl
        }

        let rules = [
            [/([dscznDSCZN])j([aeiouyąę])/g, (m, c, v) => {
                const map = {
                    a: "я",
                    e: "є",
                    i: "и",
                    o: "йо",
                    u: "ю",
                    y: "ы",
                    ą: "ѭ",
                    ę: "ѩ"
                }
                const base = letters[c] || c
                return base + "ъ" + (map[v] || v)
            }],

            [/l([aeiouyąęó])/gi, (m, v) => {
                const map = {
                    a: "я",
                    e: "є",
                    i: "и",
                    o: "ьо",
                    u: "ю",
                    y: "ы",
                    ą: "ѭ",
                    ę: "ѩ",
                    ó: "ьꙋ"
                }
                return capFirst(m, "л" + (map[v.toLowerCase()] || v))
            }],

            [/rz([aeiouyąęó])?/gi, (m, v) => {
                const map = {
                    a: "я",
                    e: "є",
                    i: "и",
                    o: "ьо",
                    u: "ю",
                    y: "и",
                    ą: "ѭ",
                    ę: "ѩ",
                    ó: "ьꙋ"
                }
                if (!v) return capFirst(m, "рь")
                return capFirst(m, "р" + (map[v.toLowerCase()] || v))
            }],

            [/i([aeouąęó])/gi, (m, v) => {
                const map = {
                    a: "я",
                    e: "є",
                    o: "іо",
                    u: "ю",
                    ą: "ѭ",
                    ę: "ѩ",
                    ó: "іꙋ"
                }
                return capFirst(m, map[v.toLowerCase()] || v)
            }],

            [/j([aeouąęó])/gi, (m, v) => {
                const map = {
                    a: "я",
                    e: "є",
                    o: "ѥ",
                    u: "ю",
                    ą: "ѭ",
                    ę: "ѩ",
                    ó: "йꙋ"
                }
                return capFirst(m, map[v.toLowerCase()] || v)
            }],

            ["szcz", "щ"],
            ["dż", "дж"],
            ["cz", "ч"],
            ["sz", "ш"],
            ["ch", "х"],
            ["dz", "дз"]
        ]

        rules.sort((a, b) => {
            const A = a[0] instanceof RegExp ? 0 : a[0].length
            const B = b[0] instanceof RegExp ? 0 : b[0].length
            return B - A
        })

        function transliterate(text) {
            let result = text
            rules.forEach(rule => {
                const [pattern, replacement] = rule
                if (pattern instanceof RegExp) {
                    result = result.replace(pattern, replacement)
                } else {
                    result = result.replace(new RegExp(pattern, "gi"), m => capFirst(m, replacement))
                }
            })
            result = result.replace(/./g, ch => letters[ch] || ch)
            return result
        }

        document.getElementById("input").addEventListener("input", e => {
            document.getElementById("output").textContent = transliterate(e.target.value)
        })
    </script>
</body>

</html>
