<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gdiniô – kaszëbskô karta (vector)</title>
  <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    html,
    body {
      height: 100dvh; 
      margin: 0;
      padding: 0;
      overscroll-behavior-y: none; 
    }

    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
  <script>
    const styleUrl =
      "https://api.maptiler.com/maps/019eeb26-4d1b-719e-9d87-9e2ddf69c9c1/style.json?key=8YnPJf4ZMtUrSD8OS9Dp";

    const gdyniaBounds = [
      [18.2900, 54.3689],
      [18.7900, 54.6689]
    ];

    const map = new maplibregl.Map({
      container: 'map',
      style: styleUrl,
      center: [18.5400, 54.5189],
      zoom: 13,
      minZoom: 11,
      maxBounds: gdyniaBounds
    });

    map.addControl(new maplibregl.NavigationControl(), 'bottom-right');

    map.addControl(
      new maplibregl.GeolocateControl({
        positionOptions: {
          enableHighAccuracy: true
        },
        trackUserLocation: true
      }),
      'bottom-right'
    );
  </script>
</body>

</html>
